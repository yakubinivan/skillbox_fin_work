#cloud-config
users:
  - name: ubuntu
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh-authorized-keys:
      - ssh-rsa  ubuntu@adminbd
    # ЗАМЕНИТЕ ЭТУ СТРОКУ НА ВАШ ПУБЛИЧНЫЙ SSH-КЛЮЧ 

# 1. Создаем конфигурационный файл VPN внутри сервера
write_files:
  - path: /etc/openvpn/server.conf
    owner: root:root
    permissions: '0644'
    content: |
      port 1194
      proto udp
      dev tun
      ca /etc/openvpn/server/ca.crt
      cert /etc/openvpn/server/server.crt
      key /etc/openvpn/server/server.key
      dh /etc/openvpn/server/dh.pem
      server 10.8.0.0 255.255.255.0
      push "route 192.168.10.0 255.255.255.0"
      keepalive 10 120
      cipher AES-256-CBC
      persist-key
      persist-tun
      status /var/log/openvpn/openvpn-status.log
      verb 3

# 2. Выполняем команды по настройке системы и софта
runcmd:
  # Обновляем систему и ставим OpenVPN
  - apt-get update
  - apt-get install -y openvpn
  
  # Включаем пересылку трафика (IP Forwarding)
  - sysctl -w net.ipv4.ip_forward=1
  - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
  
  # Настраиваем NAT, чтобы клиенты могли выходить в сеть через сервер
  - iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE
  
  # Создаем директорию для логов и запускаем сервис
  - mkdir -p /var/log/openvpn
  - systemctl enable openvpn@server
  - systemctl start openvpn@server
